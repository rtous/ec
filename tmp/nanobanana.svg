  <text x="260" y="340" font-family="Arial" font-size="10" text-anchor="end">
    Bit de presència (P). Si és 0<tspan x="260" dy="12">la pàgina està al disc. Si és</tspan><tspan x="260" dy="12">1 està a la memòria</tspan>
  </text>
  
  <text x="350" y="410" font-family="Arial" font-size="14">Adreça física</text>
  
