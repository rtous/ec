<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Logical Address Box -->
  <rect x="100" y="20" width="400" height="50" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
  <line x1="350" y1="20" x2="350" y2="70" stroke="#333" stroke-width="2"/>
  <text x="225" y="45" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">VPN (20 bits)</text>
  <text x="425" y="45" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Page Offset (12 bits)</text>
  <text x="300" y="15" font-family="Arial" font-size="12" text-anchor="middle">Logical Address</text>

  <!-- Page Table Register -->
  <rect x="20" y="150" width="120" height="40" fill="#e1f5fe" stroke="#01579b" stroke-width="2"/>
  <text x="80" y="170" font-family="Arial" font-size="11" text-anchor="middle">Page Table Register</text>

  <!-- Page Table -->
  <rect x="200" y="110" width="200" height="150" fill="#fff9c4" stroke="#fbc02d" stroke-width="2"/>
  <text x="300" y="105" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">Page Table</text>
  
  <!-- Table Rows -->
  <line x1="200" y1="140" x2="400" y2="140" stroke="#fbc02d"/>
  <line x1="200" y1="170" x2="400" y2="170" stroke="#fbc02d"/>
  <line x1="200" y1="230" x2="400" y2="230" stroke="#fbc02d"/>
  
  <!-- Column Headers -->
  <text x="215" y="130" font-family="Arial" font-size="10" font-weight="bold">VPN</text>
  <text x="250" y="130" font-family="Arial" font-size="10" font-weight="bold">P</text>
  <text x="280" y="130" font-family="Arial" font-size="10" font-weight="bold">D</text>
  <text x="340" y="130" font-family="Arial" font-size="10" font-weight="bold">PPN</text>

  <!-- Table Entry Labels -->
  <text x="215" y="160" font-family="Arial" font-size="10">0</text>
  <text x="215" y="190" font-family="Arial" font-size="10">1</text>
  <text x="215" y="250" font-family="Arial" font-size="10">2^20 - 1</text>
  <text x="300" y="210" font-family="Arial" font-size="14" text-anchor="middle">...</text>

  <!-- Physical Address Box -->
  <rect x="100" y="320" width="400" height="50" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
  <line x1="250" y1="320" x2="250" y2="370" stroke="#333" stroke-width="2"/>
  <text x="175" y="350" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">PPN</text>
  <text x="375" y="350" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Page Offset</text>
  <text x="300" y="385" font-family="Arial" font-size="12" text-anchor="middle">Physical Address</text>

  <!-- Connections -->
  <!-- VPN to Table Index -->
  <path d="M 225 70 L 225 110" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Register to Table Start -->
  <path d="M 140 170 L 200 170" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Offset Bypass -->
  <path d="M 425 70 L 425 320" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- PPN from Table to Physical Address -->
  <path d="M 340 260 L 340 290 L 175 290 L 175 320" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
  </defs>
  
  <!-- Labels for Bits -->
  <text x="250" y="210" font-family="Arial" font-size="10" fill="#d32f2f">Bit de presència (P)</text>
</svg>